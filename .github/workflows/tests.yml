name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:

  unit:
    name: Unit tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install s3fs h5netcdf xarray netCDF4 requests pytest

      - name: Run unit tests
        run: pytest tests/test_cmip6.py -v

  integration:
    name: Integration tests (S3 download, 2 models × 2 experiments)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install s3fs h5netcdf xarray netCDF4 requests pytest numpy

      - name: Run integration tests
        run: pytest tests/test_integration.py -v
