name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:

  unit:
    name: Unit tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            s3fs==2024.10.0 \
            h5netcdf==1.1.0 \
            xarray==2023.1.0 \
            netCDF4==1.7.2 \
            requests==2.32.3 \
            pytest==9.0.3 \
            numpy==1.24.4

      - name: Run unit tests
        run: pytest tests/test_cmip6.py -v

  integration:
    name: Integration tests (S3 download, 2 models × 2 experiments)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            s3fs==2024.10.0 \
            h5netcdf==1.1.0 \
            xarray==2023.1.0 \
            netCDF4==1.7.2 \
            requests==2.32.3 \
            pytest==9.0.3 \
            numpy==1.24.4

      - name: Run integration tests
        run: pytest tests/test_integration.py -vv -s
